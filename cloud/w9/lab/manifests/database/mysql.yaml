apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: w9-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  mysql-root-password: "rootpassword"
  mysql-password: "dbpassword"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: w9-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: w9-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "visits_db"
            - name: MYSQL_USER
              value: "dbuser"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistent-storage
          emptyDir: {}
