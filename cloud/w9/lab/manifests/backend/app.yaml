apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: w9-platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  DB_HOST: "mysql-service"
  DB_USER: "dbuser"
  DB_NAME: "visits_db"
  S3_BUCKET: "tf-series-bai6-app-bucket"
  AWS_REGION: "ap-southeast-1"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: w9-platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: w9-platform
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: web-app
          image: phuctien/flask-webapp-aws:latest
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AWS_REGION
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /api/status
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/status
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
